<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css"
        integrity="sha512-Kc323vGBEqzTmouAECnVceyQqyqdsSiqLQISBL29aUW4U/M7pSPA/gEUZQqv1cwx4OnYxTxve5UMg5GT6L4JJg=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <title>Log-In</title>
    <link rel="stylesheet" href="log-in.css">
</head>

<body>
    <div class="container" id="container">
        <div class="form-container1">
            <h1>Log In</h1>
            <div class="Social_Account">
                <i class="fa-brands fa-google fa-xl"></i>
                <i class="fa-brands fa-instagram fa-xl"></i>
                <i class="fa-brands fa-facebook fa-xl"></i>
                <i class="fa-brands fa-linkedin fa-xl"></i>
                <i class="fa-brands fa-square-x-twitter fa-xl"></i>
            </div>
            <form>
                <input type="text" placeholder="Username" id="Username" />
                <input type="email" placeholder="Email" id="Email" />
                <input type="password" placeholder="Password" id="Password" />
                <p id="Forget">Forget Your Password.?</p>
                <p><button type="submit" id="login-btn" class="data1">Continue</button></p>
                <p>Don't have an account?<button id="change1"> Sign up</button></p>
            </form>
            <p id="loginMsg"></p>
        </div>
        <div class="form-container2">
            <h1>Sign up</h1>
            <div class="Social_Account">
                <i class="fa-brands fa-google fa-xl"></i>
                <i class="fa-brands fa-instagram fa-xl"></i>
                <i class="fa-brands fa-facebook fa-xl"></i>
                <i class="fa-brands fa-linkedin fa-xl"></i>
                <i class="fa-brands fa-square-x-twitter fa-xl"></i>
            </div>
            <form>
                <input type="text" placeholder="Username" id="username" />
                <input type="email" placeholder="Email" id="email" />
                <input type="password" placeholder="Password" id="password" />
                <p></p>
                <button type="submit" id="sign-up-btn" class="data2">Continue</button>
                <p>Already have an account? <button id="change2"> Log In</button></p>
            </form>
            <p class="signupMsg"></p>
        </div>
    </div>
    <script src="log-in.js"></script>
</body>

</html>
